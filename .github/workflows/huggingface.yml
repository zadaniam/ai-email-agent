name: Sync to Hugging Face Space
on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync to Hugging Face
        uses: huggingface/hub-sync@v1
        with:
          repo: 'zadaniamm/ai-email-agent'

          token: ${{ secrets.HF_TOKEN }}
